# Run from repo root:
#   cp .env.docker.example .env.docker
#   docker network create contextforge   # once, if missing
#   docker compose up -d --build dashboard api
#
# Services (bind localhost; expose via host nginx — see deploy notes):
#   dashboard  http://127.0.0.1:8080
#   api        http://127.0.0.1:3000/api
#   mcp        http://127.0.0.1:3030/mcp
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: contextforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contextforge
      POSTGRES_PASSWORD: contextforge
      POSTGRES_DB: contextforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextforge -d contextforge"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - contextforge

  ollama:
    image: ollama/ollama
    container_name: contextforge-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    networks:
      - contextforge

  mcp:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    image: contextforge-mcp:latest
    container_name: contextforge-mcp
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST: contextforge-postgres
      OLLAMA_URL: http://contextforge-ollama:11434
      DATABASE_URL: postgresql://contextforge:contextforge@contextforge-postgres:5432/contextforge
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - contextforge

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: contextforge-api:latest
    container_name: contextforge-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      API_PORT: 3000
      POSTGRES_HOST: contextforge-postgres
      OLLAMA_URL: http://contextforge-ollama:11434
      DATABASE_URL: postgresql://contextforge:contextforge@contextforge-postgres:5432/contextforge
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - contextforge

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    image: contextforge-dashboard:latest
    container_name: contextforge-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - contextforge

volumes:
  postgres_data:
  ollama_data:

networks:
  contextforge:
    name: contextforge
    external: true
