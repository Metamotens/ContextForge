name: Build ContextForge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Versions
        run: |
          node -v
          pnpm -v

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @contextforge/core build

      - name: Debug Core Dist
        run: |
          echo "=== CORE DIST ==="
          find packages/core/dist -type f || true

          echo ""
          echo "=== CORE PACKAGE ==="
          cat packages/core/package.json

      - name: Check Workspace Links
        run: |
          echo "=== MCP NODE_MODULES ==="
          ls -la apps/mcp-server/node_modules/@contextforge || true

          echo ""
          echo "=== API NODE_MODULES ==="
          ls -la apps/api/node_modules/@contextforge || true

      - name: Build Shared
        run: pnpm --filter @contextforge/shared build

      - name: Build MCP
        run: pnpm --filter @contextforge/mcp-server build

      - name: Build API
        run: pnpm --filter @contextforge/api build
