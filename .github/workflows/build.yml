name: Build ContextForge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug workspace
        run: |
          echo "=== PWD ==="
          pwd

          echo ""
          echo "=== WORKSPACE ==="
          cat pnpm-workspace.yaml

          echo ""
          echo "=== ROOT PACKAGE ==="
          cat package.json

          echo ""
          echo "=== CORE PACKAGE ==="
          cat packages/core/package.json

          echo ""
          echo "=== SHARED PACKAGE ==="
          cat packages/shared/package.json

          echo ""
          echo "=== MCP PACKAGE ==="
          cat apps/mcp-server/package.json

          echo ""
          echo "=== API PACKAGE ==="
          cat apps/api/package.json

          echo ""
          echo "=== MCP NODE_MODULES ==="
          ls -la apps/mcp-server/node_modules/@contextforge || true

          echo ""
          echo "=== API NODE_MODULES ==="
          ls -la apps/api/node_modules/@contextforge || true

          echo ""
          echo "=== ROOT NODE_MODULES ==="
          ls -la node_modules/@contextforge || true

          echo ""
          echo "=== INSTALLED WORKSPACE PACKAGES ==="
          pnpm list -r

      - name: Build
        run: pnpm build
